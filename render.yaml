services:
  - type: web
    name: chm-gold-exchange-api
    runtime: python
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chmgold-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: MINI_APP_URL
        sync: false
      - key: CXC_API_LOGIN
        sync: false
      - key: CXC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: worker
    name: chm-gold-exchange-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m bot.main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chmgold-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: MINI_APP_URL
        sync: false
      - key: CXC_API_LOGIN
        sync: false
      - key: CXC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: chmgold-db
    plan: free
    databaseName: chmgold
    user: chmgold
